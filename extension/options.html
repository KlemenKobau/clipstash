<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 16px;
        min-width: 300px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .status {
        margin-top: 8px;
        color: #2a7;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <label for="server-url">Clipstash Server URL</label>
    <input
      type="url"
      id="server-url"
      placeholder="http://localhost:3000"
    />
    <div class="status" id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
